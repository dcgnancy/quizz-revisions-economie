<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz de Révisions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== ÉCRAN 1 : ACCUEIL ===== -->
  <div id="screen-home" class="screen active">
    <header class="home-header">
      <div class="home-logo">Quiz<span>Révisions</span></div>
      <p class="home-subtitle" id="home-matiere">Chargement…</p>
    </header>
    <main class="home-main">
      <h1 class="home-title">Choisissez un chapitre</h1>
      <div class="themes-list" id="themes-list"></div>
    </main>
    <footer class="home-footer">
      <span id="footer-stats"></span>
    </footer>
  </div>

  <!-- ===== ÉCRAN 1b : SÉLECTION DU MODE ===== -->
  <div id="screen-mode" class="screen">
    <div class="mode-wrap">
      <div class="mode-card">
        <button class="btn-mode-back" id="btn-mode-back">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Retour
        </button>
        <p class="mode-chapitre-label" id="mode-chapitre-label"></p>
        <h2 class="mode-title">Choisissez un mode</h2>
        <div class="mode-options" id="mode-options"></div>
      </div>
    </div>
  </div>

  <!-- ===== ÉCRAN 2 : QUIZ ===== -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-topbar">
      <button class="btn-back" id="btn-back" aria-label="Retour">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Chapitres
      </button>
      <div class="quiz-progress-wrap">
        <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="progress-fill"></div></div>
        <span class="quiz-progress-label" id="progress-label">1 / 1</span>
      </div>
      <div class="quiz-topbar-right">
        <div class="quiz-timer" id="quiz-timer">
          <svg class="timer-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span id="timer-display">30</span>
        </div>
        <div class="quiz-score-live" id="score-live">0 pts</div>
      </div>
    </div>

    <div class="quiz-body" id="quiz-body">
      <div class="question-wrap" id="question-wrap">
        <div class="q-meta">
          <span class="q-badge" id="q-badge">QCU</span>
          <span class="q-num" id="q-num">Question 1</span>
        </div>
        <p class="q-enonce" id="q-enonce"></p>
        <p class="q-hint" id="q-hint"></p>
        <div class="options-list" id="options-list"></div>
        <div class="q-feedback" id="q-feedback"></div>
        <div class="q-actions">
          <button class="btn-validate" id="btn-validate" disabled>Valider</button>
          <button class="btn-next hidden" id="btn-next">Suivant →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== ÉCRAN 3 : RÉSULTATS ===== -->
  <div id="screen-results" class="screen">
    <div class="results-wrap">
      <div class="results-card">
        <div class="results-header">
          <p class="results-chapitre" id="res-chapitre"></p>
          <div class="results-score-circle" id="res-circle">
            <span class="res-score-num" id="res-num">0</span>
            <span class="res-score-den" id="res-den">/ 0</span>
          </div>
          <p class="results-pct" id="res-pct">0 %</p>
          <p class="results-mention" id="res-mention"></p>
        </div>
        <div id="res-note15" style="border-radius:12px;padding:1rem 1.25rem;text-align:center;margin-bottom:1.25rem;"></div>
        <div class="results-stats" id="res-stats"></div>
        <div class="results-actions">
          <button class="btn-retry" id="btn-retry">Recommencer ce mode</button>
          <button class="btn-change-mode" id="btn-change-mode">Changer de mode</button>
          <button class="btn-home" id="btn-home">Choisir un autre chapitre</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
